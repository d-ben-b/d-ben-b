<!-- tech-lines.svg | Language breakdown bar — reflects real GitHub language stats -->
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="150" viewBox="0 0 1000 150" fill="none" role="img" aria-label="Most used languages">
  <defs>
    <radialGradient id="tbg" cx="20%" cy="0%" r="130%">
      <stop offset="0%" stop-color="#141a2e"/>
      <stop offset="60%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#7A77FF"/>
      <stop offset="100%" stop-color="#FF6EC7"/>
    </linearGradient>
    <filter id="tglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="barclip"><rect x="40" y="58" width="920" height="18" rx="9"/></clipPath>
  </defs>

  <rect width="1000" height="150" rx="16" fill="url(#tbg)"/>

  <!-- Title -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="40" y="40" font-size="20" font-weight="800" fill="#e6edf3">Most Used Languages</text>
    <text x="40" y="40" font-size="20" font-weight="800" fill="url(#accent)" opacity="0.0">Most Used Languages</text>
    <rect x="40" y="48" width="70" height="3" rx="1.5" fill="url(#accent)" filter="url(#tglow)"/>
  </g>

  <!-- Stacked language bar (widths proportional to real % of 920px track) -->
  <g clip-path="url(#barclip)">
    <g>
      <animateTransform attributeName="transform" type="scale" from="0 1" to="1 1" dur="1.1s" fill="freeze" additive="sum"/>
      <rect x="40"    y="58" width="528" height="18" fill="#F37726"/>
      <rect x="568"   y="58" width="307" height="18" fill="#3776AB"/>
      <rect x="875"   y="58" width="51"  height="18" fill="#A8B9CC"/>
      <rect x="926"   y="58" width="26"  height="18" fill="#E44D26"/>
      <rect x="952"   y="58" width="8"   height="18" fill="#41B883"/>
    </g>
  </g>
  <rect x="40" y="58" width="920" height="18" rx="9" fill="none" stroke="#233043" stroke-width="1"/>

  <!-- Legend -->
  <g font-family="'JetBrains Mono', ui-monospace, Consolas, monospace" font-size="13">
    <g transform="translate(40,108)">
      <circle cx="6" cy="-4" r="6" fill="#F37726"/>
      <text x="18" y="0" fill="#c9d1d9">Jupyter Notebook</text>
      <text x="18" y="0" dx="140" fill="#7f8ea3">57.4%</text>
    </g>
    <g transform="translate(280,108)">
      <circle cx="6" cy="-4" r="6" fill="#3776AB"/>
      <text x="18" y="0" fill="#c9d1d9">Python</text>
      <text x="18" y="0" dx="66" fill="#7f8ea3">33.4%</text>
    </g>
    <g transform="translate(440,108)">
      <circle cx="6" cy="-4" r="6" fill="#A8B9CC"/>
      <text x="18" y="0" fill="#c9d1d9">C</text>
      <text x="18" y="0" dx="22" fill="#7f8ea3">5.6%</text>
    </g>
    <g transform="translate(560,108)">
      <circle cx="6" cy="-4" r="6" fill="#E44D26"/>
      <text x="18" y="0" fill="#c9d1d9">HTML</text>
      <text x="18" y="0" dx="52" fill="#7f8ea3">2.8%</text>
    </g>
    <g transform="translate(700,108)">
      <circle cx="6" cy="-4" r="6" fill="#41B883"/>
      <text x="18" y="0" fill="#c9d1d9">Vue</text>
      <text x="18" y="0" dx="40" fill="#7f8ea3">0.9%</text>
    </g>
  </g>
</svg>
