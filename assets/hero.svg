<!-- hero.svg | Animated profile banner — RUAN, SHAO-MING (Ben) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300" fill="none" role="img" aria-label="Ben — AI / ML and Full-Stack Engineer">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="18%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#141a2e"/>
      <stop offset="45%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>

    <!-- Brand gradient for headline -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#7A77FF"/>
      <stop offset="100%" stop-color="#FF6EC7"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7A77FF"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6EC7"/>
      <stop offset="100%" stop-color="#7A77FF"/>
    </linearGradient>
    <linearGradient id="aurora3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EF9A5"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>

    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#20304a" stroke-width="1" opacity="0.25"/>
    </pattern>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="node" r="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1000" height="300" rx="16" fill="url(#bg)"/>
  <rect width="1000" height="300" rx="16" fill="url(#grid)"/>

  <!-- Aurora blobs (blurred, slowly drifting) -->
  <g opacity="0.55" filter="url(#soft)">
    <ellipse cx="180" cy="70" rx="150" ry="110" fill="url(#aurora1)">
      <animate attributeName="cx" values="180;240;180" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="9s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="820" cy="240" rx="180" ry="120" fill="url(#aurora2)">
      <animate attributeName="cy" values="240;190;240" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.7;0.45" dur="11s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="640" cy="60" rx="130" ry="90" fill="url(#aurora3)">
      <animate attributeName="cx" values="640;700;640" dur="16s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Right-side orbital / neural motif -->
  <g transform="translate(820,150)" filter="url(#glow)">
    <g fill="none" stroke="url(#brand)" stroke-width="1.4" opacity="0.7">
      <ellipse rx="96" ry="42">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="96" ry="42">
        <animateTransform attributeName="transform" type="rotate" from="60" to="420" dur="24s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="96" ry="42">
        <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="24s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <circle r="16" fill="url(#brand)" opacity="0.9">
      <animate attributeName="r" values="15;18;15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="7" fill="#0d1117" stroke="#00E5FF" stroke-width="1.5"/>
    <!-- orbiting electrons -->
    <circle r="4" fill="#FF6EC7">
      <animateMotion dur="6s" repeatCount="indefinite" path="M0,0 a96,42 0 1,1 0.1,0"/>
    </circle>
    <circle r="3.4" fill="#6EF9A5">
      <animateMotion dur="8s" repeatCount="indefinite" rotate="auto" path="M0,0 a42,96 0 1,0 0.1,0"/>
    </circle>
  </g>

  <!-- Constellation nodes (left/center) -->
  <g fill="url(#node)">
    <circle cx="120" cy="230" r="2.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="250" r="2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="235" r="2.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="120" r="1.8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Text content -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="60" y="86" font-size="15" letter-spacing="3" fill="#7f8ea3" font-weight="600">阮紹銘 · RUAN, SHAO-MING</text>

    <text x="58" y="150" font-size="58" font-weight="800" fill="url(#brand)" filter="url(#glow)">Hi, I&#39;m Ben</text>
    <text x="470" y="150" font-size="44">👋</text>

    <text x="60" y="192" font-size="24" font-weight="700" fill="#e6edf3">AI / ML &amp; Full-Stack Engineer</text>

    <g font-family="'JetBrains Mono', ui-monospace, Consolas, monospace">
      <text x="60" y="232" font-size="15" fill="#9da7b1">Python · Jupyter · C · Vue · HTML</text>
      <text x="60" y="258" font-size="14" fill="#6b7686">EE @ National Cheng Kung University, Taiwan 🇹🇼</text>
      <!-- blinking cursor -->
      <rect x="352" y="220" width="10" height="16" fill="#00E5FF">
        <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
